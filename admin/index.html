<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — École Francophone</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .top-bar {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3154;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .top-bar h1 { font-size: 15px; font-weight: 600; color: #a78bfa; letter-spacing: .02em; }
    .top-bar .sep { color: #3d4070; }
    .token-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .token-wrap label { font-size: 12px; color: #7c85b3; }
    .token-input {
      width: 240px; padding: 5px 10px; border-radius: 6px;
      border: 1px solid #2d3154; background: #0f1117; color: #e2e8f0;
      font-size: 13px; font-family: monospace;
    }
    .token-input:focus { outline: none; border-color: #6366f1; }
    .btn-sm {
      padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; transition: opacity .15s;
    }
    .btn-sm:hover { opacity: .85; }
    .btn-save-token { background: #4f46e5; color: #fff; }
    .token-status { font-size: 11px; }
    .token-status.ok { color: #34d399; }
    .token-status.err { color: #f87171; }

    /* ── Toolbar ── */
    .toolbar {
      background: #14172a;
      border-bottom: 1px solid #2d3154;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .toolbar label { font-size: 12px; color: #7c85b3; }
    select {
      padding: 6px 10px; border-radius: 6px;
      border: 1px solid #2d3154; background: #1a1d2e; color: #e2e8f0;
      font-size: 13px; cursor: pointer;
    }
    select:focus { outline: none; border-color: #6366f1; }

    .tab-group { display: flex; gap: 4px; margin-left: 8px; }
    .tab {
      padding: 5px 14px; border-radius: 6px; border: 1px solid transparent;
      background: transparent; color: #7c85b3; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .tab.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .tab:not(.active):hover { border-color: #2d3154; color: #e2e8f0; }

    .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-validate { background: #0f4c3a; color: #34d399; border: 1px solid #1a7a5e; }
    .btn-save { background: #4f46e5; color: #fff; }
    .btn-load { background: #1a1d2e; color: #a78bfa; border: 1px solid #2d3154; }

    /* ── Status bar ── */
    .status-bar {
      padding: 6px 20px;
      font-size: 12px;
      background: #14172a;
      border-bottom: 1px solid #2d3154;
      min-height: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .status-bar.idle { color: #7c85b3; }
    .status-bar.loading { color: #fbbf24; }
    .status-bar.ok { color: #34d399; }
    .status-bar.err { color: #f87171; }
    .spinner {
      width: 12px; height: 12px; border: 2px solid #fbbf24;
      border-top-color: transparent; border-radius: 50%;
      animation: spin .6s linear infinite; display: none;
    }
    .spinner.visible { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Editor ── */
    .editor-wrap {
      flex: 1; display: flex; flex-direction: column; padding: 16px 20px;
      gap: 0; overflow: hidden;
    }
    .editor-meta {
      font-size: 11px; color: #4a5180; margin-bottom: 6px; font-family: monospace;
    }
    textarea#editor {
      flex: 1; width: 100%;
      background: #1a1d2e; color: #c9d1e8;
      border: 1px solid #2d3154; border-radius: 8px;
      padding: 16px; font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px; line-height: 1.6; resize: none;
      tab-size: 2;
    }
    textarea#editor:focus { outline: none; border-color: #6366f1; }

    /* ── Error overlay on textarea ── */
    textarea#editor.has-error { border-color: #f87171; }
  </style>
</head>
<body>

<!-- ── Top bar : token ── -->
<div class="top-bar">
  <h1>École Francophone</h1>
  <span class="sep">›</span>
  <span style="font-size:13px;color:#7c85b3">Éditeur de contenu</span>
  <div class="token-wrap">
    <label for="token-input">Token GitHub</label>
    <input id="token-input" class="token-input" type="password" placeholder="ghp_…" autocomplete="off">
    <button class="btn-sm btn-save-token" onclick="saveToken()">Enregistrer</button>
    <span id="token-status" class="token-status"></span>
  </div>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <label for="level-select">Niveau</label>
  <select id="level-select" onchange="onLevelChange()">
    <option value="a1">A1</option>
    <option value="a2">A2</option>
    <option value="b1">B1</option>
    <option value="b2">B2</option>
    <option value="c1c2">C1/C2</option>
  </select>

  <div class="tab-group">
    <button class="tab active" id="tab-cours" onclick="switchTab('cours')">Unités de cours</button>
    <button class="tab" id="tab-ex" onclick="switchTab('exercices')">Exercices</button>
  </div>

  <div class="toolbar-right">
    <button class="btn btn-load" onclick="loadFile()">⟳ Recharger depuis GitHub</button>
    <button class="btn btn-validate" onclick="validateJson()">✓ Valider JSON</button>
    <button class="btn btn-save" onclick="saveFile()" id="btn-save">↑ Enregistrer sur GitHub</button>
  </div>
</div>

<!-- ── Status ── -->
<div class="status-bar idle" id="status-bar">
  <div class="spinner" id="spinner"></div>
  <span id="status-msg">Entrez votre token GitHub puis chargez un fichier.</span>
</div>

<!-- ── Editor ── -->
<div class="editor-wrap">
  <div class="editor-meta" id="editor-meta"></div>
  <textarea id="editor" spellcheck="false" placeholder="Le contenu JSON apparaîtra ici après le chargement…"></textarea>
</div>

<script>
'use strict';

var REPO  = 'alexishoppeler-bot/ecole-francophone';
var BRANCH = 'main';

var state = {
  tab: 'cours',       // 'cours' | 'exercices'
  level: 'a1',
  sha: null,          // SHA du fichier actuel (nécessaire pour le PUT GitHub)
  filePath: null
};

/* ── Token ── */
function getToken() { return localStorage.getItem('ef_gh_token') || ''; }

function saveToken() {
  var val = document.getElementById('token-input').value.trim();
  if (!val) { setTokenStatus('Token vide', false); return; }
  localStorage.setItem('ef_gh_token', val);
  setTokenStatus('Enregistré', true);
}

function setTokenStatus(msg, ok) {
  var el = document.getElementById('token-status');
  el.textContent = msg;
  el.className = 'token-status ' + (ok ? 'ok' : 'err');
}

/* ── Status ── */
function setStatus(msg, type) {
  var bar = document.getElementById('status-bar');
  var sp  = document.getElementById('spinner');
  document.getElementById('status-msg').textContent = msg;
  bar.className = 'status-bar ' + (type || 'idle');
  sp.className  = 'spinner' + (type === 'loading' ? ' visible' : '');
}

/* ── Tab / level ── */
function switchTab(tab) {
  state.tab = tab;
  document.getElementById('tab-cours').className = 'tab' + (tab === 'cours' ? ' active' : '');
  document.getElementById('tab-ex').className    = 'tab' + (tab === 'exercices' ? ' active' : '');
  state.sha = null;
  document.getElementById('editor').value = '';
  document.getElementById('editor-meta').textContent = '';
  setStatus('Fichier non chargé — cliquez sur "Recharger depuis GitHub".', 'idle');
}

function onLevelChange() {
  state.level = document.getElementById('level-select').value;
  state.sha = null;
  document.getElementById('editor').value = '';
  document.getElementById('editor-meta').textContent = '';
  setStatus('Niveau changé — cliquez sur "Recharger depuis GitHub".', 'idle');
}

/* ── File path helpers ── */
function currentFilePath() {
  if (state.tab === 'cours') {
    return 'js/course-data/' + state.level + '.js';
  } else {
    return 'js/exercise-content/' + state.level + '.js';
  }
}

/* ── Extract JSON from JS file ── */
function extractJson(jsContent) {
  // Match:  var part = { ... };  \n  var cd / var ec
  var m = jsContent.match(/var part = (\{[\s\S]*?\});\s*\n\s*var (?:cd|ec) /);
  if (!m) throw new Error('Structure du fichier JS non reconnue (var part = {...} introuvable).');
  return m[1];
}

/* ── Rebuild JS file from edited JSON ── */
function rebuildJs(jsonStr, level, tab) {
  // Validate first
  JSON.parse(jsonStr); // throws if invalid

  if (tab === 'cours') {
    return "'use strict';\n\n(function() {\n  var part = " + jsonStr + ";\n" +
      "  var cd = window.COURSE_DATA = window.COURSE_DATA || { sections: [], unitContent: {}, verbData: {}, dialogues: {} };\n" +
      "  if (part.section) cd.sections.push(part.section);\n" +
      "  Object.assign(cd.unitContent, part.units || {});\n" +
      "  Object.assign(cd.verbData, part.verbs || {});\n" +
      "  Object.assign(cd.dialogues, part.dialogues || {});\n" +
      "}());\n";
  } else {
    return "'use strict';\n\n(function() {\n  var part = " + jsonStr + ";\n" +
      "  var ec = window.EXERCISE_CONTENT = window.EXERCISE_CONTENT || { byUnit: {}, parts: {} };\n" +
      "  if (part && part.units) {\n" +
      "    Object.assign(ec.byUnit, part.units);\n" +
      "    ec.parts[\"" + level + "\"] = part;\n" +
      "  }\n" +
      "}());\n";
  }
}

/* ── GitHub API helpers ── */
function ghHeaders() {
  var token = getToken();
  if (!token) throw new Error('Token GitHub manquant — entrez-le en haut à droite.');
  return {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    'Content-Type': 'application/json'
  };
}

async function ghGet(path) {
  var url = 'https://api.github.com/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH;
  var res = await fetch(url, { headers: ghHeaders() });
  if (!res.ok) {
    var err = await res.json().catch(() => ({}));
    throw new Error('GitHub ' + res.status + ' : ' + (err.message || res.statusText));
  }
  return res.json();
}

async function ghPut(path, content, sha, message) {
  var url = 'https://api.github.com/repos/' + REPO + '/contents/' + path;
  var body = {
    message: message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: BRANCH,
    sha: sha
  };
  var res = await fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
  if (!res.ok) {
    var err = await res.json().catch(() => ({}));
    throw new Error('GitHub ' + res.status + ' : ' + (err.message || res.statusText));
  }
  return res.json();
}

/* ── Load ── */
async function loadFile() {
  var token = getToken();
  if (!token) { setStatus('Token GitHub manquant.', 'err'); return; }

  var path = currentFilePath();
  state.filePath = path;
  setStatus('Chargement de ' + path + ' …', 'loading');
  document.getElementById('btn-save').disabled = true;

  try {
    var data = await ghGet(path);
    state.sha = data.sha;

    // Decode base64 → UTF-8
    var jsContent = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));

    // Extract JSON data
    var jsonStr = extractJson(jsContent);

    // Pretty-print
    var pretty = JSON.stringify(JSON.parse(jsonStr), null, 2);
    document.getElementById('editor').value = pretty;
    document.getElementById('editor').classList.remove('has-error');
    document.getElementById('editor-meta').textContent = path + '  ·  ' + (pretty.length / 1024).toFixed(1) + ' ko  ·  SHA: ' + data.sha.slice(0, 7);
    setStatus('Chargé depuis GitHub ✓', 'ok');
    document.getElementById('btn-save').disabled = false;
  } catch (e) {
    setStatus('Erreur : ' + e.message, 'err');
  }
}

/* ── Validate ── */
function validateJson() {
  var val = document.getElementById('editor').value.trim();
  if (!val) { setStatus('Éditeur vide.', 'err'); return; }
  try {
    JSON.parse(val);
    document.getElementById('editor').classList.remove('has-error');
    setStatus('JSON valide ✓', 'ok');
  } catch (e) {
    document.getElementById('editor').classList.add('has-error');
    setStatus('JSON invalide : ' + e.message, 'err');
  }
}

/* ── Save ── */
async function saveFile() {
  if (!state.sha) { setStatus('Chargez d\'abord le fichier depuis GitHub.', 'err'); return; }

  var jsonStr = document.getElementById('editor').value.trim();
  if (!jsonStr) { setStatus('Éditeur vide.', 'err'); return; }

  // Validate
  try { JSON.parse(jsonStr); } catch (e) {
    document.getElementById('editor').classList.add('has-error');
    setStatus('JSON invalide — corrigez avant d\'enregistrer : ' + e.message, 'err');
    return;
  }
  document.getElementById('editor').classList.remove('has-error');

  var path = currentFilePath();
  var jsContent = rebuildJs(jsonStr, state.level, state.tab);
  var tabLabel = state.tab === 'cours' ? 'course-data' : 'exercise-content';
  var commitMsg = 'Éditeur admin : mise à jour ' + tabLabel + '/' + state.level;

  setStatus('Enregistrement sur GitHub…', 'loading');
  document.getElementById('btn-save').disabled = true;

  try {
    var result = await ghPut(path, jsContent, state.sha, commitMsg);
    state.sha = result.content.sha;
    document.getElementById('editor-meta').textContent = path + '  ·  ' + (jsonStr.length / 1024).toFixed(1) + ' ko  ·  SHA: ' + result.content.sha.slice(0, 7);
    setStatus('Enregistré ✓  — déploiement GitHub Pages en cours (~1 min)', 'ok');
    document.getElementById('btn-save').disabled = false;
  } catch (e) {
    setStatus('Erreur : ' + e.message, 'err');
    document.getElementById('btn-save').disabled = false;
  }
}

/* ── Tab key in textarea ── */
document.getElementById('editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var s = this.selectionStart;
    var v = this.value;
    this.value = v.slice(0, s) + '  ' + v.slice(this.selectionEnd);
    this.selectionStart = this.selectionEnd = s + 2;
  }
});

/* ── Init ── */
(function init() {
  var saved = getToken();
  if (saved) {
    document.getElementById('token-input').value = saved;
    setTokenStatus('Token chargé', true);
  }
  state.level = document.getElementById('level-select').value;
}());
</script>
</body>
</html>
