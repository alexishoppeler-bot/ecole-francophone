<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeux | learning progress</title>
  <link rel="stylesheet" href="style.css">
  <script src="moteur.js"></script>
</head>
<body>
  <header>
    <div class="gauche">
      <a href="index.html" class="logo-shell">
        <img src="logo.png" alt="Logo école francophone" class="logo-img">
        <div class="logo-texte">learning progress</div>
      </a>
    </div>
    <nav aria-label="Navigation principale">
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
        <li class="nav-item"><a href="unite.html?unite=a1-0" class="nav-link">Démo</a></li>
        <li class="nav-item"><a href="connexion.html" class="nav-link">Connexion</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="section">
      <h2>Choisissez un jeu ou une évaluation</h2>
      <p class="section-intro">Cliquez sur un jeu pour commencer à jouer, ou testez-vous avec l'évaluation finale.</p>
      <div class="cartes" id="jeux"></div>
      <a href="#" id="lien-eval" class="carte carte-lien" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(59, 130, 246, 0.15) 100%); border: 2px solid rgba(34, 197, 94, 0.3); position: relative;">
        <span class="badge" style="background: linear-gradient(135deg, #22c55e 0%, #3b82f6 100%);">Évaluation</span>
        <p><strong>📊 Évaluation finale</strong></p>
        <p style="font-size: 0.9em; opacity: 0.8;">30 questions • 80% pour valider</p>
      </a>
    </section>

    <div class="retour-actions">
      <a href="#" id="lien-retour" class="btn btn-secondaire">↩ Retour à l'unité</a>
    </div>
  </main>
  <footer></footer>

  <script>
    const u = U();
    if (u) {
      document.title = "Jeux | Unité " + u.meta.label;
      document.querySelector("footer").textContent = "© 2026 learning progress · " + u.meta.label + " Jeux";

      const jeuxListe = [
        ["quiz", "quiz.html", "Quiz rapide"],
        ["vraiFaux", "vrai-faux.html", "Vrai ou faux"],
        ["demeler", "demeler.html", "Démêler les lettres"],
        ["associer", "associer.html", "Associer"],
        ["pendu", "pendu.html", "Le pendu"],
        ["motTrous", "mot-trous.html", "Phrases à trous"]
      ];
      const div = document.getElementById("jeux");
      jeuxListe.forEach(([cle, page, label]) => {
        div.innerHTML += '<a href="' + lienUnite(page) + '" class="carte carte-lien"><span class="badge">' + label + '</span><p>' + u.jeux.descriptions[cle] + '</p></a>';
      });

      // Branche le lien de l'évaluation finale
      document.getElementById("lien-eval").href = lienUnite("progression.html");
      document.getElementById("lien-retour").href = lienUnite("unite.html");
    }
  </script>
  <script src="parole.js"></script>
</body>
</html>
