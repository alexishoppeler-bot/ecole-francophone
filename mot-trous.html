<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phrases à trous | learning progress</title>
  <link rel="stylesheet" href="style.css">
  <script src="moteur.js"></script>
</head>
<body>
  <header>
    <div class="gauche">
      <a href="index.html" class="logo-shell">
        <img src="logo.png" alt="Logo école francophone" class="logo-img">
        <div class="logo-texte">learning progress</div>
      </a>
    </div>
    <nav aria-label="Navigation principale">
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
        <li class="nav-item"><a href="unite.html?unite=a1-0" class="nav-link active">Démo</a></li>
        <li class="nav-item"><a href="connexion.html" class="nav-link">Connexion</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="section">
      <div class="jeu-conteneur">
        <div class="jeu-header">
          <div class="jeu-progress-bar"><div class="jeu-progress-fill" id="progress"></div></div>
          <div class="jeu-stats">
            <span id="compteur"></span>
            <span id="score">Score : 0</span>
          </div>
        </div>
        <div id="zone-jeu" class="jeu-card-anim">
          <p class="trous-phrase" id="phrase"></p>
          <p class="trous-indice" id="indice"></p>
          <div class="trous-choix" id="choix"></div>
          <p class="jeu-feedback" id="feedback"></p>
        </div>
        <div id="zone-resultat" class="jeu-resultat" style="display:none">
          <div class="resultat-emoji" id="res-emoji"></div>
          <h2 id="res-titre"></h2>
          <p id="res-detail"></p>
          <button class="btn-jeu" onclick="init()">Rejouer</button>
          <a href="#" id="lien-retour" class="btn-jeu btn-jeu-sec">↩ Retour aux jeux</a>
        </div>
      </div>
    </section>
  </main>

  <footer></footer>

  <script>
    const u = U();
    if (u) {
      document.querySelector("footer").textContent = "© 2026 learning progress · " + u.meta.label + " Phrases à trous";
      document.title = "Phrases à trous | Unité " + u.meta.label;

      const data = u.motTrous;
      let idx, pts;

      function init() {
        idx = 0; pts = 0;
        document.getElementById("zone-resultat").style.display = "none";
        document.getElementById("zone-jeu").style.display = "block";
        afficher();
      }

      function afficher() {
        const item = data[idx];
        document.getElementById("compteur").textContent = (idx + 1) + " / " + data.length;
        document.getElementById("score").textContent = "Score : " + pts;
        document.getElementById("progress").style.width = ((idx / data.length) * 100) + "%";
        document.getElementById("feedback").textContent = "";
        document.getElementById("feedback").className = "jeu-feedback";

        const zone = document.getElementById("zone-jeu");
        zone.classList.remove("jeu-card-anim");
        void zone.offsetWidth;
        zone.classList.add("jeu-card-anim");

        const parts = item.phrase.split("___");
        document.getElementById("phrase").innerHTML = parts[0] + '<span class="trous-blank">___</span>' + parts[1];
        document.getElementById("indice").textContent = item.indice;

        const div = document.getElementById("choix");
        div.innerHTML = "";
        const shuffled = melangerTableau(item.options);
        shuffled.forEach((txt, i) => {
          const btn = document.createElement("button");
          btn.className = "trous-option jeu-opt-anim";
          btn.style.animationDelay = (i * 0.08) + "s";
          btn.textContent = txt;
          btn.onclick = () => choisir(btn, txt, item);
          div.appendChild(btn);
        });
      }

      function choisir(btn, txt, item) {
        const div = document.getElementById("choix");
        const fb = document.getElementById("feedback");
        div.querySelectorAll("button").forEach(b => { b.disabled = true; b.classList.add("quiz-disabled"); });

        const parts = item.phrase.split("___");

        if (txt === item.reponse) {
          btn.classList.add("quiz-correct", "jeu-pulse");
          fb.textContent = "Correct !";
          fb.className = "jeu-feedback feedback-correct";
          document.getElementById("phrase").innerHTML = parts[0] + '<span class="trous-filled">' + txt + '</span>' + parts[1];
          pts++;
        } else {
          btn.classList.add("quiz-incorrect", "jeu-shake");
          fb.textContent = "C'était : " + item.reponse;
          fb.className = "jeu-feedback feedback-incorrect";
          document.getElementById("phrase").innerHTML = parts[0] + '<span class="trous-filled trous-filled-err">' + item.reponse + '</span>' + parts[1];
          div.querySelectorAll("button").forEach(b => {
            if (b.textContent === item.reponse) b.classList.add("quiz-correct");
          });
        }

        document.getElementById("score").textContent = "Score : " + pts;
        setTimeout(() => { idx++; idx < data.length ? afficher() : terminer(); }, 1400);
      }

      function terminer() {
        document.getElementById("zone-jeu").style.display = "none";
        document.getElementById("progress").style.width = "100%";
        const res = document.getElementById("zone-resultat");
        res.style.display = "flex";
        const pct = Math.round((pts / data.length) * 100);
        document.getElementById("res-emoji").textContent = pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪";
        document.getElementById("res-titre").textContent = pts + " / " + data.length;
        document.getElementById("res-detail").textContent = pct + "% de bonnes réponses.";
        res.classList.add("jeu-card-anim");
      }

      document.getElementById("lien-retour").href = lienUnite("jeux.html");

      window.init = init;
      init();
    }
  </script>
  <script src="parole.js"></script>
</body>
</html>
