<body>
  <div id="header-slot"></div>
  <div class="page-wrap">

    <main class="unite-main">
      <a class="cours-back" href="index.html">â† Cours</a>
      <div class="unite-hero blue">
        <div class="unite-hero-copy">
          <h2 class="unite-hero-title">Mon tableau de progression</h2>
          <p class="unite-hero-sub">Suivez votre avancement dans tous les niveaux</p>
        </div>

  <script src="../js/site-text.js"></script>

  <script>
  (function renderProgression() {
    var root = document.getElementById('prog-root');
    if (!root) return;

    // Read progress from localStorage (key used by course-shared.js)
    var STORAGE_KEY = 'ah:cours:progress:v1';
    var raw = {};
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

    // Count total units and done per section
    var totalAll = 0, doneAll = 0;
    var sectionStats = (COURSE_SECTIONS || []).map(function(sec) {
      var total = sec.entries.length, done = 0;
      sec.entries.forEach(function(e) {
        var key = e.href.replace('.html','').replace('unite-','');
        if (raw['unite-' + key] && raw['unite-' + key].status) done++;
      });
      totalAll += total; doneAll += done;
      return { title: sec.title, cls: sec.cls, total: total, done: done, entries: sec.entries };
    });

    var pctAll = totalAll > 0 ? Math.round(doneAll / totalAll * 100) : 0;
    var emoji  = pctAll === 100 ? 'ðŸ†' : pctAll >= 75 ? 'â­' : pctAll >= 40 ? 'ðŸ‘' : 'ðŸ’ª';

    var html = '<section class="unite-section prog-global" style="--section-i:0">'
      + '<h3 class="unite-section-title"><span class="unite-section-icon" aria-hidden="true">ðŸŒ</span>Progression globale</h3>'
      + '<div class="prog-global-card">'
      + '<div class="prog-global-emoji">' + emoji + '</div>'
      + '<div class="prog-global-info">'
      + '<div class="prog-global-pct">' + pctAll + '%</div>'
      + '<div class="prog-global-label">' + doneAll + ' / ' + totalAll + ' unitÃ©s consultÃ©es</div>'
      + '</div>'
      + '<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:' + pctAll + '%"></div></div>'
      + '</div>'
      + '</section>';

    sectionStats.forEach(function(sec, si) {
      var pct = sec.total > 0 ? Math.round(sec.done / sec.total * 100) : 0;
      html += '<section class="unite-section" style="--section-i:' + (si+1) + '">'
        + '<h3 class="unite-section-title"><span class="unite-section-icon unite-section-icon--' + sec.cls + '" aria-hidden="true">' + sec.title + '</span>' + sec.title + ' â€” ' + pct + '% (' + sec.done + '/' + sec.total + ')</h3>'
        + '<div class="prog-bar-wrap prog-bar-wrap--sm"><div class="prog-bar-fill prog-bar-fill--' + sec.cls + '" style="width:' + pct + '%"></div></div>'
        + '<div class="prog-unit-grid">'
        + sec.entries.map(function(e) {
            var key = 'unite-' + e.href.replace('.html','').replace('unite-','');
            var isDone = raw[key] && raw[key].status;
            var status = isDone ? 'done' : 'todo';
            return '<a class="prog-unit-chip prog-unit-chip--' + status + '" href="' + e.href + '" title="' + e.label + '">'
              + '<span class="prog-unit-badge">' + (e.badge !== undefined ? e.badge : '') + '</span>'
              + '<span class="prog-unit-label">' + e.label + '</span>'
              + (isDone ? '<span class="prog-unit-check" aria-hidden="true">âœ“</span>' : '')
              + '</a>';
          }).join('')
        + '</div>'
        + '</section>';
    });

    if (doneAll === 0) {
      html += '<section class="unite-section" style="--section-i:' + (sectionStats.length+1) + '">'
        + '<div class="prog-empty"><p>ðŸŒ± Vous n\'avez pas encore commencÃ©. Consultez les unitÃ©s pour enregistrer votre progression !</p>'
        + '<a class="game-btn game-btn--primary" href="index.html">Commencer les cours â†’</a></div>'
        + '</section>';
    }

    html += '<section class="unite-section" style="--section-i:' + (sectionStats.length+2) + '">'
      + '<div class="prog-reset-wrap">'
      + '<button class="game-btn game-btn--secondary" id="progReset">ðŸ—‘ RÃ©initialiser ma progression</button>'
      + '</div></section>';

    root.innerHTML = html;

    var resetBtn = document.getElementById('progReset');
    if (resetBtn) {
      resetBtn.addEventListener('click', function() {
        if (confirm('Effacer toute votre progression ? Cette action est irrÃ©versible.')) {
          localStorage.removeItem(STORAGE_KEY);
          location.reload();
        }
      });
    }
  }());
  </script>
  <script src="../js/focus-mode.js"></script>
