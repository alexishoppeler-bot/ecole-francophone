<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>École Francophone | Unité 0 — Se repérer dans le monde francophone</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="cours.css">
</head>
<body>
  <div id="header-slot"></div>
  <div class="page-wrap page-wrap--no-sidebar">

    <main class="unite-main">
      <a class="cours-back" data-keep-label="true" href="../plateformes/a1/index.html">← Choix d'unité</a>

      <script>
        function openLightbox() { document.getElementById('francoLightbox').classList.add('open'); document.body.style.overflow='hidden'; }
        function closeLightbox() { document.getElementById('francoLightbox').classList.remove('open'); document.body.style.overflow=''; }
        document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLightbox(); });
      </script>

      <div class="unite-hero blue">
        <div class="unite-hero-badge">
          <span class="unite-hero-badge-label">Unité</span>
          <span class="unite-hero-badge-num">0</span>
        </div>
        <div class="unite-hero-copy">
          <div class="unite-hero-tag">Débutants · A1</div>
          <h2 class="unite-hero-title">Se repérer dans le monde francophone</h2>
        </div>
        <span class="unite-hero-icon" aria-hidden="true">🌍</span>
      </div>

      <figure class="franco-fig">
        <img src="../assets/francophonie.png" alt="Carte du monde francophone" class="franco-img" onclick="openLightbox()" title="Cliquer pour agrandir">
        <figcaption class="franco-caption">🌍 Les pays et régions francophones dans le monde</figcaption>
      </figure>
      <style>
        .franco-fig { margin: 0 0 20px; text-align: center; }
        .franco-img {
          max-width: 340px; width: 100%; border-radius: 16px;
          box-shadow: 0 4px 24px rgba(90,171,240,.22);
          animation: francoFloat 4s ease-in-out infinite;
          transition: transform .3s, box-shadow .3s;
          cursor: pointer;
        }
        .franco-img:hover {
          transform: scale(1.04) translateY(-4px);
          box-shadow: 0 10px 36px rgba(136,0,255,.28);
        }
        @keyframes francoFloat {
          0%,100% { transform: translateY(0); }
          50%      { transform: translateY(-6px); }
        }
        .franco-caption {
          font-size: .78rem; color: var(--text-muted,#666);
          margin-top: 8px; display: block;
          animation: francoFadeIn 1s ease .3s both;
        }
        @keyframes francoFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

        /* Lightbox */
        .franco-lightbox {
          display: none; position: fixed; inset: 0; z-index: 9999;
          background: rgba(0,0,0,.82); backdrop-filter: blur(6px);
          align-items: center; justify-content: center; cursor: zoom-out;
          animation: lbIn .22s ease;
        }
        .franco-lightbox.open { display: flex; }
        @keyframes lbIn { from{opacity:0} to{opacity:1} }
        .franco-lightbox img {
          max-width: 92vw; max-height: 88vh;
          border-radius: 18px; box-shadow: 0 12px 60px rgba(0,0,0,.6);
          animation: lbImgIn .25s ease;
        }
        @keyframes lbImgIn { from{transform:scale(.88)} to{transform:scale(1)} }
        .franco-lightbox-close {
          position: absolute; top: 18px; right: 22px;
          background: rgba(255,255,255,.15); border: none; color: #fff;
          font-size: 1.4rem; width: 40px; height: 40px; border-radius: 50%;
          cursor: pointer; display: flex; align-items: center; justify-content: center;
          transition: background .15s;
        }
        .franco-lightbox-close:hover { background: rgba(255,255,255,.3); }
      </style>

      <div class="franco-lightbox" id="francoLightbox" onclick="closeLightbox()">
        <button class="franco-lightbox-close" onclick="closeLightbox()" aria-label="Fermer">✕</button>
        <img src="../assets/francophonie.png" alt="Carte du monde francophone agrandie" onclick="event.stopPropagation()">
      </div>

<div class="unite-sections"></div>
    </main>
    <div id="footer-slot" class="page-footer"></div>
  </div>
  <script src="../js/site-text.js"></script>
  <script src="../js/course-data/levels/a1.js"></script>
  <script src="../js/course-data/levels/a2.js"></script>
  <script src="../js/course-data/levels/b1.js"></script>
  <script src="../js/course-data/levels/b2.js"></script>
  <script src="../js/course-data/levels/c1c2.js"></script>
  <script src="../js/course-data/index.js"></script>
  <script src="../js/content.js"></script>
  <script src="../js/course-shared.js"></script>
  <script src="../js/focus-mode.js"></script>
</body>
</html>
