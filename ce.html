<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compréhension écrite | learning progress</title>
  <link rel="stylesheet" href="style.css">
  <script src="moteur.js"></script>
</head>
<body>
  <header>
    <div class="gauche">
      <a href="index.html" class="logo-shell">
        <img src="logo.png" alt="Logo école francophone" class="logo-img">
        <div class="logo-texte">learning progress</div>
      </a>
    </div>
    <nav aria-label="Navigation principale">
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
        <li class="nav-item"><a href="unite.html?unite=a1-0" class="nav-link active">Démo</a></li>
        <li class="nav-item"><a href="connexion.html" class="nav-link">Connexion</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section">
      <h2 id="sectionTitre"></h2>
      <p class="section-intro" id="sectionIntro"></p>
      <div class="cartes cartes-single" id="textes"></div>
    </section>

    <div class="retour-actions">
      <a href="#" id="lien-retour" class="btn btn-secondaire">↩ Retour à communication</a>
    </div>
  </main>

  <footer></footer>

  <script>
    const u = U();
    if (u) {
      document.title = "Compréhension écrite | " + u.meta.label + " Communication";
      document.getElementById("sectionTitre").textContent = u.ce.sectionTitre;
      document.getElementById("sectionIntro").textContent = u.ce.sectionIntro;
      document.querySelector("footer").textContent = "© 2026 learning progress · " + u.meta.label + " Compréhension écrite";

      const div = document.getElementById("textes");
      u.ce.textes.forEach((t) => {
        const optsHTML = melangerTableau(t.options).map((o) => '<button class="quiz-option" onclick="verifier(this,' + (o[1] ? "true" : "false") + ')">' + o[0] + '</button>').join("");
        div.innerHTML += '<div class="carte carte-ce"><span class="badge">' + t.badge + '</span>'
          + '<div class="texte-zone"><p class="texte-contenu">' + t.texte + '</p></div>'
          + '<div class="quiz-zone"><p class="quiz-question">' + t.question + '</p><div class="quiz-options">' + optsHTML + '</div><p class="quiz-feedback"></p></div>'
          + '</div>';
      });

      document.getElementById("lien-retour").href = lienUnite("communication.html");
    }
  </script>
  <script src="parole.js"></script>
</body>
</html>
