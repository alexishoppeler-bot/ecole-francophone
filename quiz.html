<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz | learning progress</title>
  <link rel="stylesheet" href="style.css">
  <script src="moteur.js"></script>
</head>
<body>
  <header>
    <div class="gauche">
      <a href="index.html" class="logo-shell">
        <img src="logo.png" alt="Logo école francophone" class="logo-img">
        <div class="logo-texte">learning progress</div>
      </a>
    </div>
    <nav aria-label="Navigation principale">
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
        <li class="nav-item"><a href="unite.html?unite=a1-0" class="nav-link active">Démo</a></li>
        <li class="nav-item"><a href="connexion.html" class="nav-link">Connexion</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section">
      <div class="jeu-conteneur">
        <div class="jeu-header">
          <div class="jeu-progress-bar"><div class="jeu-progress-fill" id="progress"></div></div>
          <div class="jeu-stats">
            <span id="compteur"></span>
            <span id="timer">⏱ 0s</span>
            <span id="score">Score : 0</span>
          </div>
        </div>
        <div id="zone-question" class="jeu-card-anim">
          <p class="jeu-question-text" id="question"></p>
          <div class="jeu-options-grid" id="options"></div>
          <p class="jeu-feedback" id="feedback"></p>
        </div>
        <div id="zone-resultat" class="jeu-resultat" style="display:none">
          <div class="resultat-emoji" id="res-emoji"></div>
          <h2 id="res-titre"></h2>
          <p id="res-detail"></p>
          <button class="btn-jeu" onclick="initQuiz()">Rejouer</button>
          <a href="#" id="lien-retour" class="btn-jeu btn-jeu-sec">↩ Retour aux jeux</a>
        </div>
      </div>
    </section>
  </main>

  <footer></footer>

  <script>
    const u = U();
    if (u) {
      document.querySelector("footer").textContent = "© 2026 learning progress · " + u.meta.label + " Quiz";
      document.title = "Quiz | Unité " + u.meta.label;

      const data = u.quiz;

      let idx, pts, timerVal, timerRef;

      function initQuiz() {
        idx = 0; pts = 0; timerVal = 0;
        document.getElementById("zone-resultat").style.display = "none";
        document.getElementById("zone-question").style.display = "block";
        clearInterval(timerRef);
        timerRef = setInterval(() => {
          timerVal++;
          document.getElementById("timer").textContent = "⏱ " + timerVal + "s";
        }, 1000);
        afficher();
      }

      function afficher() {
        const item = data[idx];
        document.getElementById("compteur").textContent = "Question " + (idx + 1) + " / " + data.length;
        document.getElementById("score").textContent = "Score : " + pts;
        document.getElementById("progress").style.width = ((idx / data.length) * 100) + "%";
        document.getElementById("feedback").textContent = "";
        document.getElementById("feedback").className = "jeu-feedback";

        document.getElementById("question").textContent = item.q;

        const div = document.getElementById("options");
        div.innerHTML = "";
        const zone = document.getElementById("zone-question");
        zone.classList.remove("jeu-card-anim");
        void zone.offsetWidth;
        zone.classList.add("jeu-card-anim");

        const ordre = melangerTableau(item.o.map((_, i) => i));
        ordre.forEach((origI, pos) => {
          const btn = document.createElement("button");
          btn.className = "quiz-option jeu-opt-anim";
          btn.style.animationDelay = (pos * 0.08) + "s";
          btn.textContent = item.o[origI];
          btn.dataset.idx = origI;
          btn.onclick = () => choisir(btn, origI, item.r);
          div.appendChild(btn);
        });
      }

      function choisir(btn, i, r) {
        const div = document.getElementById("options");
        const fb = document.getElementById("feedback");
        div.querySelectorAll("button").forEach(b => { b.disabled = true; b.classList.add("quiz-disabled"); });

        if (i === r) {
          btn.classList.add("quiz-correct");
          fb.textContent = "Correct !";
          fb.className = "jeu-feedback feedback-correct";
          pts++;
          btn.classList.add("jeu-pulse");
        } else {
          btn.classList.add("quiz-incorrect");
          div.querySelector('[data-idx="' + r + '"]').classList.add("quiz-correct");
          fb.textContent = "La bonne réponse était : " + data[idx].o[r];
          fb.className = "jeu-feedback feedback-incorrect";
          btn.classList.add("jeu-shake");
        }

        document.getElementById("score").textContent = "Score : " + pts;
        setTimeout(() => { idx++; idx < data.length ? afficher() : terminer(); }, 1200);
      }

      function terminer() {
        clearInterval(timerRef);
        document.getElementById("zone-question").style.display = "none";
        document.getElementById("progress").style.width = "100%";
        const res = document.getElementById("zone-resultat");
        res.style.display = "flex";

        const pct = Math.round((pts / data.length) * 100);
        document.getElementById("res-emoji").textContent = pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪";
        document.getElementById("res-titre").textContent = pts + " / " + data.length;
        document.getElementById("res-detail").textContent = pct + "% de bonnes réponses en " + timerVal + " secondes.";
        res.classList.add("jeu-card-anim");
      }

      document.getElementById("lien-retour").href = lienUnite("jeux.html");

      window.initQuiz = initQuiz;
      initQuiz();
    }
  </script>
  <script src="parole.js"></script>
</body>
</html>
