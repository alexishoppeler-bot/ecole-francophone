<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démêler | learning progress</title>
  <link rel="stylesheet" href="style.css">
  <script src="moteur.js"></script>
</head>
<body>
  <header>
    <div class="gauche">
      <a href="index.html" class="logo-shell">
        <img src="logo.png" alt="Logo école francophone" class="logo-img">
        <div class="logo-texte">learning progress</div>
      </a>
    </div>
    <nav aria-label="Navigation principale">
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
        <li class="nav-item"><a href="unite.html?unite=a1-0" class="nav-link active">Démo</a></li>
        <li class="nav-item"><a href="connexion.html" class="nav-link">Connexion</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="section">
      <div class="jeu-conteneur">
        <div class="jeu-header">
          <div class="jeu-progress-bar"><div class="jeu-progress-fill" id="progress"></div></div>
          <div class="jeu-stats">
            <span id="compteur"></span>
            <span id="score">Score : 0</span>
          </div>
        </div>
        <div id="zone-jeu" class="jeu-card-anim">
          <p class="demeler-indice" id="indice"></p>
          <div class="demeler-reponse-zone" id="reponse-zone"></div>
          <div class="demeler-lettres" id="lettres"></div>
          <div class="demeler-actions">
            <button class="btn-jeu btn-jeu-sec" onclick="effacer()">Effacer</button>
            <button class="btn-jeu" onclick="valider()">Valider</button>
          </div>
          <p class="jeu-feedback" id="feedback"></p>
        </div>
        <div id="zone-resultat" class="jeu-resultat" style="display:none">
          <div class="resultat-emoji" id="res-emoji"></div>
          <h2 id="res-titre"></h2>
          <p id="res-detail"></p>
          <button class="btn-jeu" onclick="init()">Rejouer</button>
          <a href="#" id="lien-retour" class="btn-jeu btn-jeu-sec">↩ Retour aux jeux</a>
        </div>
      </div>
    </section>
  </main>

  <footer></footer>

  <script>
    const u = U();
    if (u) {
      document.querySelector("footer").textContent = "© 2026 learning progress · " + u.meta.label + " Démêler";
      document.title = "Démêler | Unité " + u.meta.label;

      const data = u.demeler;

      let idx, pts, choisi;

      function melanger(mot) {
        const arr = mot.split("");
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr.join("") === mot ? melanger(mot) : arr;
      }

      function init() {
        idx = 0; pts = 0;
        document.getElementById("zone-resultat").style.display = "none";
        document.getElementById("zone-jeu").style.display = "block";
        afficher();
      }

      function afficher() {
        choisi = [];
        const item = data[idx];
        document.getElementById("compteur").textContent = (idx + 1) + " / " + data.length;
        document.getElementById("score").textContent = "Score : " + pts;
        document.getElementById("progress").style.width = ((idx / data.length) * 100) + "%";
        document.getElementById("feedback").textContent = "";
        document.getElementById("feedback").className = "jeu-feedback";
        document.getElementById("indice").textContent = item.indice;

        const zone = document.getElementById("zone-jeu");
        zone.classList.remove("jeu-card-anim");
        void zone.offsetWidth;
        zone.classList.add("jeu-card-anim");

        const lettres = melanger(item.mot);
        const div = document.getElementById("lettres");
        div.innerHTML = "";
        lettres.forEach((l, i) => {
          const btn = document.createElement("button");
          btn.className = "demeler-lettre jeu-opt-anim";
          btn.style.animationDelay = (i * 0.05) + "s";
          btn.textContent = l.toUpperCase();
          btn.dataset.idx = i;
          btn.onclick = () => {
            if (btn.disabled) return;
            btn.disabled = true;
            btn.classList.add("demeler-lettre-used");
            choisi.push({ lettre: l, btnIdx: i });
            renderReponse();
          };
          div.appendChild(btn);
        });
        renderReponse();
      }

      function renderReponse() {
        const div = document.getElementById("reponse-zone");
        const mot = data[idx].mot;
        div.innerHTML = "";
        for (let i = 0; i < mot.length; i++) {
          const span = document.createElement("span");
          span.className = "demeler-case" + (choisi[i] ? " demeler-case-filled" : "");
          span.textContent = choisi[i] ? choisi[i].lettre.toUpperCase() : "";
          div.appendChild(span);
        }
      }

      function effacer() {
        const div = document.getElementById("lettres");
        choisi.forEach(c => {
          const btn = div.querySelector(`[data-idx="${c.btnIdx}"]`);
          btn.disabled = false;
          btn.classList.remove("demeler-lettre-used");
        });
        choisi = [];
        renderReponse();
        document.getElementById("feedback").textContent = "";
      }

      function valider() {
        const mot = data[idx].mot;
        const rep = choisi.map(c => c.lettre).join("");
        const fb = document.getElementById("feedback");

        if (rep.length < mot.length) {
          fb.textContent = "Placez toutes les lettres.";
          fb.className = "jeu-feedback feedback-incorrect";
          return;
        }

        if (rep === mot) {
          fb.textContent = "Bravo !";
          fb.className = "jeu-feedback feedback-correct";
          pts++;
          document.getElementById("reponse-zone").classList.add("jeu-pulse");
        } else {
          fb.textContent = "C'était : " + mot.toUpperCase();
          fb.className = "jeu-feedback feedback-incorrect";
          document.getElementById("reponse-zone").classList.add("jeu-shake");
        }

        document.getElementById("score").textContent = "Score : " + pts;
        setTimeout(() => {
          document.getElementById("reponse-zone").classList.remove("jeu-pulse", "jeu-shake");
          idx++;
          idx < data.length ? afficher() : terminer();
        }, 1400);
      }

      function terminer() {
        document.getElementById("zone-jeu").style.display = "none";
        document.getElementById("progress").style.width = "100%";
        const res = document.getElementById("zone-resultat");
        res.style.display = "flex";
        const pct = Math.round((pts / data.length) * 100);
        document.getElementById("res-emoji").textContent = pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪";
        document.getElementById("res-titre").textContent = pts + " / " + data.length;
        document.getElementById("res-detail").textContent = pct + "% des mots trouvés.";
        res.classList.add("jeu-card-anim");
      }

      document.getElementById("lien-retour").href = lienUnite("jeux.html");

      window.init = init;
      window.effacer = effacer;
      window.valider = valider;
      init();
    }
  </script>
  <script src="parole.js"></script>
</body>
</html>
