<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conjugaison | learning progress</title>
  <link rel="stylesheet" href="style.css">
  <script src="moteur.js"></script>
</head>
<body>
  <header>
    <div class="gauche">
      <a href="index.html" class="logo-shell">
        <img src="logo.png" alt="Logo école francophone" class="logo-img">
        <div class="logo-texte">learning progress</div>
      </a>
    </div>
    <nav aria-label="Navigation principale">
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
        <li class="nav-item"><a href="unite.html?unite=a1-0" class="nav-link">Démo</a></li>
        <li class="nav-item"><a href="connexion.html" class="nav-link">Connexion</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="section">
      <h2 id="sectionTitre"></h2>
      <p class="section-intro" id="sectionIntro"></p>
      <div class="cartes cartes-single" id="cartes"></div>
    </section>

    <div class="retour-actions">
      <a href="#" id="lien-retour" class="btn btn-secondaire">↩ Retour à l'unité</a>
    </div>
  </main>
  <footer></footer>

  <script>
    const u = U();
    if (u && !u.conjugaison) {
      document.title = "Conjugaison | Unité " + u.meta.label;
      document.querySelector("main").innerHTML = '<section class="section"><h2>Pas de conjugaison dans cette unité</h2><p>Cette unité ne propose pas de partie « Conjugaison ». <a href="' + lienUnite("unite.html") + '">Retour à l\'unité</a>.</p></section>';
    } else if (u) {
      document.title = "Conjugaison | Unité " + u.meta.label;
      document.getElementById("sectionTitre").textContent = u.conjugaison.sectionTitre;
      document.getElementById("sectionIntro").textContent = u.conjugaison.sectionIntro;
      document.querySelector("footer").textContent = "© 2026 learning progress · " + u.meta.label + " Conjugaison";

      const div = document.getElementById("cartes");
      u.conjugaison.cartes.forEach((c) => {
        const contenuHTML = c.contenu ? '<div class="lecon-contenu">' + c.contenu + '</div>' : "";
        const tableHTML = c.entetes
          ? '<table class="gram-table"><thead><tr>' + c.entetes.map((e) => '<th>' + e + '</th>').join("") + '</tr></thead><tbody>'
            + c.lignes.map((l) => '<tr>' + l.map((cell) => '<td>' + cell + '</td>').join("") + '</tr>').join("") + '</tbody></table>'
          : "";
        div.innerHTML += '<div class="carte carte-conj"><span class="badge">' + c.badge + '</span>'
          + '<div class="lecon-zone">' + contenuHTML + tableHTML + '</div>'
          + quizZonesHTML(c.questions)
          + '</div>';
      });
      attacherExplicationsQuestions(div, ".carte-conj", u.conjugaison.cartes, (c) => c.explication || c.contenu.replace(/<[^>]+>/g, ""));
      document.getElementById("lien-retour").href = lienUnite("unite.html");
    }
  </script>
  <script src="parole.js"></script>
</body>
</html>
